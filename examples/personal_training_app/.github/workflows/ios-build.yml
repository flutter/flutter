name: iOS Build

on:
  workflow_dispatch:
    inputs:
      app_env:
        description: Build environment passed as APP_ENV
        required: true
        default: production
        type: choice
        options:
          - production
          - staging

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS (release, no code signing)
        run: flutter build ios --release --no-codesign --dart-define=APP_ENV=${{ inputs.app_env }}

      - name: Package Runner.app artifact
        run: |
          mkdir -p build/ios_artifacts
          ditto -c -k --sequesterRsrc --keepParent build/ios/iphoneos/Runner.app build/ios_artifacts/Runner.app.zip

      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-runner-app-${{ inputs.app_env }}
          path: build/ios_artifacts/Runner.app.zip
          if-no-files-found: error
