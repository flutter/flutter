name: Linux Analyze

on:
  pull_request:
    branches: [master]
  merge_group:
    branches: [master]

jobs:
  Tree_analyze:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 130

    steps:
      # Note: we must check out the tree for the composite action to be available
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Check Engine Changes
        id: check_engine
        run: |
          # 1. Determine local base tracking ref
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="origin/${{ github.event.pull_request.base.ref }}"
          elif [ "${{ github.event_name }}" = "merge_group" ]; then
            # Strip refs/heads/ if present
            BASE_REF_NAME="${{ github.event.merge_group.base_ref }}"
            BASE_REF_NAME="${BASE_REF_NAME#refs/heads/}"
            BASE_REF="origin/$BASE_REF_NAME"
          else
            BASE_REF="origin/master"
          fi

          echo "Comparing against base ref: $BASE_REF"

          # 2. Get changed files using local git diff against tracking branch
          CHANGED_FILES=$(git diff --name-only "$BASE_REF" HEAD 2>/dev/null || true)

          # Fallback if git diff fails or is empty
          if [ -z "$CHANGED_FILES" ]; then
            echo "Falling back to git diff HEAD~1 HEAD"
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          # 3. Check if any file matches engine pattern:
          # ^(DEPS|engine/.*|bin/internal/content_aware_hash\.(ps1|sh))$
          ENGINE_CHANGED=false
          while IFS= read -r file; do
            if [[ -z "$file" ]]; then
              continue
            fi
            if [[ "$file" =~ ^DEPS$ ]] || [[ "$file" =~ ^engine/ ]] || [[ "$file" =~ ^bin/internal/content_aware_hash\.(ps1|sh)$ ]]; then
              echo "Engine file changed: $file"
              ENGINE_CHANGED=true
            fi
          done <<< "$CHANGED_FILES"

          echo "changed=$ENGINE_CHANGED" >> "$GITHUB_OUTPUT"

      - name: Wait for test check-in
        if: steps.check_engine.outputs.changed == 'true'
        uses: lewagon/wait-on-check-action@9312864dfbc9fd208e9c0417843430751c042800
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          check-name: 'Linux linux_host_engine'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30 # seconds
          checks-discovery-timeout: 3600 # Wait up to 1 hour for LUCI to register the check
          allowed-conclusions: success,neutral
          verbose: false

      - uses: ./.github/actions/composite-flutter-setup

      - name: Run Analyze
        run: |
          SHARD=analyze SHARED=analyze LUCI_CI=true dart --enable-asserts dev/bots/test.dart
