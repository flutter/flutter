name: platform_views_layout
description: A benchmark for platform views.

environment:
  sdk: ^3.10.0-0

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  google_mobile_ads: any
  # To change the version of the gallery assets, edit
  #   //packages/flutter_tools/lib/src/commands/update_packages.dart
  # and run
  #   flutter update-packages --force-upgrade


dev_dependencies:
  flutter_test:
    sdk: flutter
  test: any


flutter:
  uses-material-design: true
  assets:
    - packages/flutter_gallery_assets/people/square/ali.png
    - packages/flutter_gallery_assets/places/india_chettinad_silk_maker.png
  config:
    # This project uses "google_mobile_ads", which is not compatible with Swift Package Manager.
    # Disable it until https://github.com/googleads/googleads-mobile-flutter/issues/1239 is resolved.
    enable-swift-package-manager: false
